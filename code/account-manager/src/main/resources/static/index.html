<!DOCTYPE html>
<html lang="zh">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="vuetify/vuetify.min.css">
  <link rel="stylesheet" href="fontawesome/css/all.min.css">
  <link rel="stylesheet" href="index.css">
  <title>账号管理器</title>
  <link rel="shortcut icon" href="favicon.ico" type="image/x-icon" />
  <script src="vue/vue.global.prod.js"></script>
  <script src="axios/axios.min.js"></script>
  <script src="vuetify/vuetify.min.js"></script>
</head>

<body>

  <div id="app">
    <v-app>

      <!-- 左侧导航栏 -->
      <v-navigation-drawer permanent floating width="160">
        <v-sheet color="blue" border-0 rounded="be-lg" class="d-flex align-center justify-center text-h5 font-italic" height="50">账号管理器</v-sheet>
        <v-list nav class="text-center text-h5" color="blue">
          <v-list-item :active="accountShowFlag" @click="moduleShow('accountShowFlag')">账号</v-list-item>
          <v-list-item :active="categoryShowFlag" @click="moduleShow('categoryShowFlag')">分类</v-list-item>
          <v-list-item :active="transferShowFlag" @click="moduleShow('transferShowFlag')">迁移</v-list-item>
          <v-list-item :active="configShowFlag" @click="moduleShow('configShowFlag')">设置</v-list-item>
        </v-list>
      </v-navigation-drawer>

      <!-- 主体 -->
      <v-main>
        <v-container>

          <!-- 欢迎 -->
          <template v-if="helloShowFlag">
            <h1>欢迎使用账号管理器！</h1>
          </template>

          <!-- 账号 -->
          <template v-if="accountShowFlag">
            <v-row align="center">
              <v-col cols="2">
                <v-select label="分类筛选" 
                          v-model="accountTableQueryCategoryId"
                          :items="accountTableQueryCategoryDatas"
                          item-title="category_name"
                          item-value="id"
                          variant="underlined"
                          clearable 
                          clear-icon="fa-solid fa-xmark">
                </v-select>                
              </v-col>
              <v-col cols="4">
                <v-text-field label="名称搜索" 
                              v-model="accountTableQueryKeywordAppName" 
                              variant="underlined"
                              clearable 
                              clear-icon="fa-solid fa-xmark"
                              append-icon="fa-solid fa-magnifying-glass" 
                              @click:append="accountTableQuery()">
                </v-text-field>
              </v-col>
              <v-spacer></v-spacer>
              <v-col cols="auto">
                <v-btn variant="outlined" @click="accountEditDialogShow(null)" class="text-subtitle-1">新增账号</v-btn>
              </v-col>
            </v-row>

            <v-row>
              <v-col>
                <v-data-table-server v-model:items-per-page="accountTablePageSize"
                  :page="accountTablePageNum"
                  :items-per-page-options="accountTablePageSizeOptions"
                  :items-per-page-text="accountTablePageSizeOptionsText"  
                  :headers="accountTableHeaders" 
                  :items="accountTableDatas"
                  :items-length="accountTableTotal" 
                  :loading="accountTableLoading" 
                  @update:options="accountTableQuery"
                  @update:page="accountTablePageNumHandle" 
                  show-current-page="true" 
                  first-icon="fa-solid fa-angles-left" prev-icon="fa-solid fa-angle-left" 
                  next-icon="fa-solid fa-angle-right" last-icon="fa-solid fa-angles-right"
                  density="comfortable">
                  <template v-slot:item.actions="{ item }">
                    <div class="d-flex ga-2 justify-end">
                      <v-icon size="small" @click="accountEditDialogShow(item)">
                        fa-solid fa-pen
                      </v-icon>
                      <v-icon size="small" color="red" @click="accountDelDialogShow(item)">
                        fa-solid fa-trash-can
                      </v-icon>
                    </div>
                  </template>
                </v-data-table-server>
              </v-col>
            </v-row>

            <v-dialog v-model="accountEditDialogShowFlag" width="auto" persistent>
              <v-card max-height="600" width="500" :title="accountEditDialogTitle">
                <v-form class="mx-8">
                  <v-select label="分类" 
                            v-model="accountDialogDataCategoryId"
                            :items="accountEditDialogCategoryDatas"
                            item-title="category_name"
                            item-value="id"
                            variant="outlined"
                            clearable 
                            clear-icon="fa-solid fa-xmark">
                  </v-select>
                  <v-text-field label="名称" v-model="accountDialogDataAppName" variant="outlined"></v-text-field>
                  <v-text-field label="网址" v-model="accountDialogDataAppUrl" variant="outlined"></v-text-field>
                  <v-text-field label="账号" v-model="accountDialogDataUsername" variant="outlined"></v-text-field>
                  <v-text-field label="密码" v-model="accountDialogDataPassword" variant="outlined" append-inner-icon="fa-solid fa-shuffle" @click:append-inner="passwordGet">
                  </v-text-field>
                  <v-text-field label="备注" v-model="accountDialogDataRemark" variant="outlined"></v-text-field>
                </v-form>
                <v-card-actions class="mx-6 mb-4">
                  <v-btn @click="accountEditDialogClear()" class="text-subtitle-1">取消</v-btn>
                  <!-- 弹性空间 -->
                  <v-spacer></v-spacer>
                  <v-btn color="green" @click="accountEdit()" class="text-subtitle-1">提交</v-btn>
                </v-card-actions>
              </v-card>
            </v-dialog>

            <v-dialog v-model="accountDelDialogShowFlag" width="auto" persistent>
              <v-card max-height="500" width="400" title="删除账号">
                <v-card-text class="text-body-1">
                  确定删除 <strong class="text-red">{{ accountDialogDataAppName }}</strong> 账号吗？
                </v-card-text>
                <v-card-actions class="mx-6 mb-4">
                  <v-btn @click="accountDelDialogClear()" class="text-subtitle-1">取消</v-btn>
                  <!-- 弹性空间 -->
                  <v-spacer></v-spacer>
                  <v-btn color="red" @click="accountDel()" class="text-subtitle-1">确定</v-btn>
                </v-card-actions>
              </v-card>
            </v-dialog>
          </template>

          <!-- 分类 -->
          <template v-if="categoryShowFlag">
            <v-row>
              <v-spacer></v-spacer>
              <v-col cols="auto">
                <v-btn variant="outlined" @click="categoryEditDialogShow(null)" class="text-subtitle-1">新增分类</v-btn>
              </v-col>
            </v-row>

            <v-row>
              <v-col>
                <v-data-table-server 
                  :headers="categoryTableHeaders" 
                  :items="categoryTableDatas"
                  :loading="categoryTableLoading" 
                  @update:options="categoryTableQueryAll" 
                  hide-default-footer
                  density="comfortable">
                  <template v-slot:item.actions="{ item }">
                    <div class="d-flex ga-2 justify-end">
                      <v-icon size="small" @click="categoryEditDialogShow(item)">
                        fa-solid fa-pen
                      </v-icon>
                      <v-icon size="small" color="red" @click="categoryDelDialogShow(item)">
                        fa-solid fa-trash-can
                      </v-icon>
                    </div>
                  </template>
                </v-data-table-server>
              </v-col>
            </v-row>

            <v-dialog v-model="categoryEditDialogShowFlag" width="auto" persistent>
              <v-card max-height="500" width="400" :title="categoryEditDialogTitle">
                <v-form class="mx-8">
                  <v-text-field label="分类名称" v-model="categoryDialogDataCategoryName" variant="outlined" autofocus></v-text-field>
                </v-form>
                <v-card-actions class="mx-6 mb-4">
                  <v-btn @click="categoryEditDialogClear()" class="text-subtitle-1">取消</v-btn>
                  <!-- 弹性空间 -->
                  <v-spacer></v-spacer>
                  <v-btn color="green" @click="categoryEdit()" class="text-subtitle-1">提交</v-btn>
                </v-card-actions>
              </v-card>
            </v-dialog>

            <v-dialog v-model="categoryDelDialogShowFlag" width="auto" persistent>
              <v-card max-height="500" width="400" title="删除分类">
                <v-card-text class="text-body-1">
                  确定删除 <strong class="text-red">{{ categoryDialogDataCategoryName }}</strong> 分类吗？
                </v-card-text>
                <v-card-actions class="mx-6 mb-4">
                  <v-btn @click="categoryDelDialogClear()" class="text-subtitle-1">取消</v-btn>
                  <!-- 弹性空间 -->
                  <v-spacer></v-spacer>
                  <v-btn color="red" @click="categoryDel()" class="text-subtitle-1">确定</v-btn>
                </v-card-actions>
              </v-card>
            </v-dialog>
          </template>

          <!-- 迁移-->
          <template v-if="transferShowFlag">
            <v-row>
              <v-col>
                <v-card title="导入：先选择要导入的xlsx文件，然后点击按钮" variant="outlined">
                  <div class="mx-8 mb-4">
                    <v-file-input v-model="transferImportFile"
                      label="选择文件" 
                      accept=".xlsx, application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"
                      variant="outlined"
                      prepend-icon="" 
                      append-icon="fa-solid fa-file-import"
                      clearable
                      clear-icon="fa-solid fa-xmark"
                      show-size
                      @click:append="transferImport">
                    </v-file-input>
                  </div>
                </v-card>
              </v-col>
            </v-row>
            
            <v-row>
              <v-col>
                <v-card title="导出：下载包含全部数据的xlsx文件；当没有数据时，下载的文件即为导入数据的xlsx模板" variant="outlined">
                  <div class="mx-8 mb-8">
                    <v-btn variant="outlined" @click="transferExport" class="text-subtitle-1">导出数据/下载模板</v-btn>
                  </div>
                </v-card>
              </v-col>
            </v-row>
          </template>

          <!-- 设置 -->
          <template v-if="configShowFlag">
            <v-row>
              <v-col>
                <v-data-table-server 
                  :headers="configTableHeaders" 
                  :items="configTableDatas"
                  :loading="configTableLoading" 
                  @update:options="configTableQueryAll" 
                  hide-default-footer
                  density="comfortable">
                  <template v-slot:item.actions="{ item }">
                    <div class="d-flex ga-2 justify-end">
                      <v-icon size="small" @click="configEditDialogShow(item)">
                        fa-solid fa-pen
                      </v-icon>
                    </div>
                  </template>
                </v-data-table-server>
              </v-col>
            </v-row>

            <v-dialog v-model="configEditDialogShowFlag" width="auto" persistent>
              <v-card max-height="500" width="400" title="修改配置">
                <v-form class="mx-8">
                  <v-text-field label="配置项" v-model="configDialogDataConfigKey" readonly variant="solo" bg-color="grey-darken-2"></v-text-field>
                  <v-text-field label="配置值" v-model="configDialogDataConfigValue" variant="outlined" autofocus></v-text-field>
                  <v-text-field label="说明" v-model="configDialogDataRemark" readonly variant="solo" bg-color="grey-darken-2"></v-text-field>
                </v-form>
                <v-card-actions class="mx-6 mb-4">
                  <v-btn @click="configEditDialogClear()" class="text-subtitle-1">取消</v-btn>
                  <!-- 弹性空间 -->
                  <v-spacer></v-spacer>
                  <v-btn color="green" @click="configEdit()" class="text-subtitle-1">提交</v-btn>
                </v-card-actions>
              </v-card>
            </v-dialog>
          </template>

          <!-- 报错弹框 -->
          <template v-if="errDialogShowFlag">
            <v-dialog v-model="errDialogShowFlag" width="auto" opacity="0" persistent>
              <v-card max-height="300" max-width="600" color="red">
                <v-card-text class="text-h6">
                  {{ errDialogMsg }}
                </v-card-text>
                <v-card-actions class="justify-center">
                  <v-btn @click="errDialogShowFlag = false" icon="fa-solid fa-xmark"></v-btn>
                </v-card-actions>
              </v-card>
            </v-dialog>
          </template>

        </v-container>
      </v-main>

      <v-footer app="true" order="-1" class="d-flex justify-center text-body-2">
        Copyright &copy; 2021 - {{ new Date().getFullYear() }} Drintau. All Rights Reserved.
      </v-footer>

    </v-app>
  </div>

  <script src="index.js"></script>
</body>

</html>
